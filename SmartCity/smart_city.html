<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            background-color: #f4f6f8;
        }

        .nagłówek {
            background-color: #1e293b;
            color: white;
            padding: 10px;
        }

        .tytuł {
            display: flex;
            align-self: center;
        }

        .główna {
            display: flex;
            min-height: 400px;
        }

        .lewa {
            width: 20%;
            background-color: white;
            color: #64748b;
            padding: 20px;
        }

        .środek {
            width: 60%;
            padding: 20px;
            background-color: white;
            color: #1e293b;
        }

        .prawa {
           /* width: 20%; */
            background-color: white;
            padding: 20px;
            text-align: center;

            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .stopka {
            background-color: #1e293b;
            color: white;
            text-align: center;
        }
    </style>
</head>
<body>
        <header class="nagłówek">
            <div class="tytuł">
                <svg width="50" height="50"> 
                    <circle cx="50" cy="50" r="40" />
                </svg>
                <h1> Zarządzanie Smart City </h1>
            </div>
        </header>

        <main class="główna">
            <aside class="lewa">
                <ul> Transport </ul>
                <ul> Energia </ul>
                <ul> środowisko </ul>
                <ul> Bezpieczenstwo </ul>
            </aside>
        
        <section class="środek">
            <h2> Mapa miasta </h2>
            <p> Interaktywna wizualizacja infrastruktury miejskiej </p>
        </section>

        <aside class="prawa">
            <div>
                <svg width="100" height="100"> 
                    <circle cx="50" cy="80" r="20" fill="#0ea5e9" />
                </svg>
                <br>
                <b>120 km</b>
                <br> Dróg
            </div>
            <div>
                <svg width="50" height="50">
                <rect x="10" y="10" width="50" height="100" fill="#0ea5e9"/>
                </svg>
                <br>
                <b>45%</b>
                <br> Zieleni
            </div>
            <div>
                <svg height="150" width="150">
                <polygon points="100,100 150,190 50,190" fill="#0ea5e9"/>
                </svg>
                <br>
                <b>98%</b>
                <br> Oświetlenia LED
            </div>
        </aside>
        </main>

        <footer class="stopka">
            <p> © 2026 Smart City - autor: Jan Kowalski</p>
        </footer>
</body>
</html>
