<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart City</title>

    <style>
        body {
            margin: 0;
            background-color: #f4f6f8;
            font-family: Arial, sans-serif;
        }

        .nagłówek {
            background-color: #1e293b;
            color: white;
            padding: 15px 30px;
        }

        .tytuł {
            display: flex;
            align-self: center;
            gap: 15px;
        }

        .główna {
            display: flex;
            min-height: 400px;
            gap: 20px;
            padding: 20px;
        }

        .lewa {
            width: 20%;
            background: white;
            padding: 20px;
            border-radius: 8px;
        }   

        .lewa ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .lewa li {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            color: #64748b;
            font-weight: 500;
        }

        .lewa svg {
            transition: FILL 0.5s;
        }

        .lewa li:hover svg {
            transition : #64748b;
        }

        .środek {
            width: 80%;
            padding: 20px;
            background-color: white;
            color: #1e293b;
        }

        .prawa {
            width: 20%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .karta{
             text-align: center;
             background-color: white;
             padding: 20px;
        }

        .karta:hover {
            box-shadow: 0 5px 15px lightgray;
            transform: translateY(-3px);
        }        

        .stopka {
            background-color: #1e293b;
            color: white;
            text-align: center;
            background-color: #1e293b;
            margin-top: 20px;
            padding: 5px;
        }


    </style>
</head>
<body>
        <header class="nagłówek">
            <div class="tytuł">
                <svg width="40" height="40">
                    <rect x="5" y="20" width="6" height="15" fill="#38bdf8"/>
                    <rect x="15" y="10" width="6" height="25" fill="#38bdf8"/>
                    <rect x="25" y="15" width="6" height="20" fill="#38bdf8"/>
                </svg>
                <h1> Zarządzanie Smart City </h1>
            </div>
        </header>

        <main class="główna">
            <aside class="lewa">
                <ul>

                    <li>
                    <svg width="15" height="15">
                    <circle cx="7" cy="7" r="6" fill="#64748b"/>
                    </svg>Transport 
                    </li>
            
                    <li>
                    <svg width="15" height="15">
                    <rect width="12" height="12" fill="#64748b"/>
                    </svg>Energia 
                    </li>
        
                    <li>
                    <svg width="15" height="15">
                    <polygon points="7,0 14,14 0,14" fill="#64748b"/>
                    </svg>Srodowisko 
                    </li>
                
                    <li>
                    <svg width="20" height="12">
                    <polygon points="0,12 20,12 15,0 5,0" fill="#64748b"/>
                    </svg>Bezpieczenstwo 
                    </li>

                </ul>
            </aside>
        
        <section class="środek">
            <h2> Mapa miasta </h2>
            <p> Interaktywna wizualizacja infrastruktury miejskiej </p>
        </section>

        <aside class="prawa">
            <div class="karta">
                <svg width="60" height="60">
                <circle cx="30" cy="30" r="15" fill="#0ea5e9"/>
                </svg>
                <br>
                <b>120 km</b>
                <br> Dróg
            </div>
            <div class="karta">
                <svg width="60" height="60">
                <rect x="15" y="20" width="30" height="30" fill="#0ea5e9"/>
                </svg>
                <br>
                <b>45%</b>
                <br> Zieleni
            </div>
            <div class="karta">
                <svg width="60" height="60">
                <polygon points="30,10 50,50 10,50" fill="#0ea5e9"/>
                </svg>
                <br>
                <b>98%</b>
                <br> Oświetlenia LED
            </div>
        </aside>
        </main>

        <footer class="stopka">
            <p> © 2026 Smart City - autor: Błażej Chabior</p>
        </footer>
</body>
</html>
