<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid lekcja 1</title>

    <style>
        body{
            background-color: #fcf8f8;
        }

        .contener{
            display: grid;
            grid-template-columns: 1fr 3fr;
            gap: 20px;
        }
    
        .header{
            grid-column: 1 / 3;
            grid-template-rows: 100px;
            background-color: #FBEFEF;
            padding: 20px;
            border: 1px dotted black;
            
        }

        .sidebar {
            grid-column: 1/2;
            padding: 20px;
            border: 1px dotted black;
            background-color: #F9DFDF;
            grid-template-rows: auto;
        }

        .main {
            grid-column: 2/3;
            padding: 20px;
            border: 1px dotted black;
            background-color: #F9DFDF;
            grid-template-rows: auto;
        }

        .footer{
            grid-column: 1/3;
            padding: 30px;
            border: 1px dotted black;
            background-color: #F5AFAF;
            grid-template-rows: 100px;
        }

    </style>
</head>
<body>
    <div class="contener">
        <header class="header">
            <h1>Nagłówek</h1>
        </header>

    <aside class="sidebar">
        <h2>Panel</h2>
        <ul>
            <li>Link 1</li>
            <li>Link 2</li>
            <li>Link 3</li>
        </ul>
    </aside>

     <main class="main">
        <h2>Główna zawartość</h2>
        <p>To jest główna treść strony. Tutaj znajduje się najważniejsza zawartość.</p>
    </main>

    <footer class="footer">
        Stopka © 2026
    </footer>

    </div>
</body>
</html>
