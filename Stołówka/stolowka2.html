<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stołówka</title>
</head>

<style>
    * {
        font-family: Century, serif;
        box-sizing: border-box;
    }

    body {
        margin: 0;
        padding: 0;
    }

    #baner {
        background-color: #CCA10B;
        color: white;
        padding: 5px;
        font-style: italic;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 10px;
        text-align: center;
    }

    #baner img {
        display: inline-block;
    }

    #baner p {
        font-weight: bold;
        font-size: 32px;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6);
        margin: 0 10px;
    }

    main {
        display: flex;
    }

    .lewa, .prawa {
        background-color: rgba(5, 160, 88, 0.8);
    }

    .lewa {
        width: 70%;
        
        text-align: left;
    }

    h1 {
        padding-left: 30px;
    }

    .lewa img {
        height: 100px;
        width: 100px;
        margin: 10px;
        margin-left: 30px;
        border-radius: 8px; 
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.7)
    }


    .lewa img:hover {
        border: 3px solid #000;
    }

    .prawa {
        width: 30%;
        padding-top: 20px;
        font-family: "Lucida Console", "Consolas", "Courier New", monospace;
        font-size: 14px;
        letter-spacing: 1px;
    }

    footer {
        background-color: #CCA10B;
        color: white;
        font-style: italic;
        padding: 5px;
        text-align: center;
    }
</style>

<body>

    <header id="baner">
        <img src="baner1.jpg" alt="grafika z logiem">
        <p>Stołówka</p>
        <img src="baner2.jpg" alt="grafika z logiem">
    </header>

    <main>
        <section class="lewa">
            <article>
                <h1>Zupy</h1>
                <img src="pomidorowa.png" alt="zupa pomidorowa" title="zupa pomidorowa">
                <img src="ogorkowa.png" alt="zupa ogórkowa" title="zupa ogórkowa">
            </article>

            <article>
                <h1>II danie</h1>
                <img src="zestawPOPR.png" alt="zestaw dnia" title="zestaw dnia">
                <img src="nalesniki.png" alt="naleśniki" title="naleśniki">
                <img src="placki.png" alt="placki ziemniaczane" title="placki ziemniaczane">
            </article>

            <article>
                <h1>Dodatki</h1>
                <img src="kompot.png" alt="kompot" title="kompot">
            </article>
        </section>

        <section class="prawa">
            <label>Podsumowanie:</label>
            <p id="podsumowanie"></p>
        </section>
    </main>

    <footer>
        <p>Stronę wykonał: 123456</p>
    </footer>

    <script>
       
    </script>

</body>

</html>
