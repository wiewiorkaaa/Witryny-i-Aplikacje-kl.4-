<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhotoGallery</title>
    <link rel="stylesheet" href="galeria.css">
</head>
<body>
    <div class="container">
        <aside class="lewo">
            <h2>PhotoGallery</h2>
            <a href="">Góry</a>
            <a href="">Morze</a>
            <a href="">Miasto</a>
        </aside>
        <main class="Main">
            <h1>Galeria</h1>
            <div class="gallery">
                <div class="zdjecie">
                    <img src="góra.jpg" alt="Góry">
                    <span>Góra</span>
                </div>
                <div class="zdjecie">
                    <img src="morze.jpg" alt="Morze">
                    <span>Morze</span>
                </div>
                <div class="zdjecie">
                    <img src="New-York-City.jpeg" alt="Miasto">
                    <span>Miasto</span>
                </div>
            </div>
            <div class="tekst">
                Wybierz zdjęcie, aby zobaczyć szczegóły.
            </div>
        </main>
    </div>
    <div class="scroll-buttons">
    <a href="#top">↑↑↑</a>
</div>
</body>
</html>
